<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION PSC - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-landing" class="active">
        <!-- Top Status Card -->
        <div class="header-card">
            <h1>Mission-PSC</h1>
            <p>Program: <strong>BA HISTORY</strong></p>
            <div class="meta-row">
                <span>Batch: BHIS2025</span>
                <span class="status">🛡️ Faculty</span>
            </div>
        </div>

        <!-- Admin Command Panel -->
        <div class="admin-panel">
            <div class="panel-header">🛠️ Administrative Command Panel <span class="badge">Live Sync Active</span></div>
            <div class="panel-grid">
                <button>Change Meta Headers</button>
                <button>+ Add Lesson Module</button>
                <button>+ Add Quiz/Exam</button>
                <button class="danger">🔑 Change Master Key</button>
            </div>
        </div>

        <!-- Hero Section -->
        <div class="hero-box">
            <h2>MISSION PSC</h2>
            <p>MES Mampad College<br>Department of History</p>
            <p class="description">Welcome to the MISSION PSC program. Learn notes, Access quizzes and try examinations.</p>
        </div>

        <!-- Modules -->
        <h4 class="section-title">ACADEMIC ENTRY MODULES</h4>
        <div id="menu-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
